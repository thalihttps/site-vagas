<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecter</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; background-color: #e3f2fd; min-height: 100vh; overflow-x: hidden; }
        .navbar { background: #0d47a1; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; top: 0; z-index: 1000; box-sizing: border-box; height: 70px; }
        .nav-links span { cursor: pointer; text-transform: uppercase; margin-left: 15px; font-size: 13px; font-weight: bold; }
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; box-shadow: 2px 0 10px rgba(0,0,0,0.1); transition: 0.3s; z-index: 1001; padding-top: 80px; }
        .sidebar.active { left: 0; }
        .menu-item { display: flex; align-items: center; padding: 15px 25px; color: #333; cursor: pointer; font-size: 14px; border-bottom: 1px solid #f0f0f0; }
        .btn-menu { background: none; border: none; color: white; font-size: 24px; cursor: pointer; display: none; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 999; }
        .overlay.active { display: block; }
        .main-container { padding: 120px 20px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .hidden { display: none !important; }
        .box-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: left; margin-bottom: 20px; }
        .box-container h2 { margin-top: 0; color: #0d47a1; text-align: center; border-bottom: 2px solid #e3f2fd; padding-bottom: 10px; }
        label { display: block; font-size: 13px; margin-bottom: 5px; font-weight: bold; color: #555; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn-acao { width: 100%; background: #0d47a1; color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .card-balao { background: white; color: #0d47a1; padding: 40px 50px; border-radius: 60px; box-shadow: 0 8px 15px rgba(0,0,0,0.1); border: 2px solid transparent; cursor: pointer; font-weight: bold; margin: 10px; text-transform: uppercase; width: 300px; }
        .req-item { display: flex; justify-content: space-between; padding: 8px; background: #f0f7ff; margin-bottom: 5px; border-radius: 5px; border: 1px solid #d1e9ff; }
        .profile-pic { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #0d47a1; object-fit: cover; display: block; margin: 0 auto 10px; background: #eee; }
        .meter { height: 5px; background: #eee; margin-top: -10px; margin-bottom: 15px; border-radius: 3px; overflow: hidden; }
        .meter-bar { height: 100%; width: 0; transition: 0.3s; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div style="display: flex; align-items: center;">
            <button class="btn-menu" id="btn-hamburguer" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            <strong style="margin-left: 10px; cursor: pointer; font-size: 20px;" onclick="location.reload()">CONNECTER</strong>
        </div>
        <div id="nav-links" class="nav-links">
            <span onclick="mostrarTela('login-empresa')">Entre como Empresa</span> | <span onclick="mostrarTela('login-candidato')">Entre como Candidato</span>
        </div>
    </nav>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div id="menu-contextual"></div>
        <div class="menu-item" onclick="location.reload()" style="color: red; border-top: 2px solid #f0f0f0;"><i class="fas fa-power-off"></i> Sair</div>
    </div>

    <div class="main-container">
        <div id="home">
            <h1 style="color: #0d47a1; font-size: 3rem; margin-bottom: 40px;">CONNECTER</h1>
            <button class="card-balao" onclick="mostrarTela('cad-empresa')">Cadastre-se Empresa</button>
            <button class="card-balao" onclick="mostrarTela('cad-candidato')">Cadastre-se Candidato</button>
        </div>

        <div id="cad-empresa" class="hidden">
            <div class="box-container">
                <h2>Cadastro Empresa</h2>
                <label>E-mail Corporativo:</label><input type="email" id="e_email">
                <label>Senha:</label><input type="password" oninput="medirSenha(this.value, 'm1')"><div class="meter"><div id="m1" class="meter-bar"></div></div>
                <label>Nome Empresa:</label><input type="text" id="e_nome">
                <label>CNPJ:</label><input type="text" maxlength="14" id="e_cnpj">
                <label>Descrição:</label><textarea id="e_desc_cad" rows="3"></textarea>
                <button class="btn-acao" onclick="executarEntrada('empresa')">CADASTRAR E ENTRAR</button>
            </div>
        </div>

        <div id="cad-candidato" class="hidden">
            <div class="box-container">
                <h2>Cadastro Candidato</h2>
                <label>E-mail Pessoal:</label><input type="email"><label>Senha:</label><input type="password" oninput="medirSenha(this.value, 'm2')"><div class="meter"><div id="m2" class="meter-bar"></div></div>
                <label>Nome Completo:</label><input type="text"><label>CPF:</label><input type="text" maxlength="11">
                <button class="btn-acao" onclick="executarEntrada('candidato')">CADASTRAR E ENTRAR</button>
            </div>
        </div>

        <div id="login-empresa" class="hidden"><div class="box-container"><h2>Login Empresa</h2><label>E-mail/CNPJ</label><input type="text"><label>Senha</label><input type="password"><button class="btn-acao" onclick="executarEntrada('empresa')">ENTRAR</button></div></div>
        <div id="login-candidato" class="hidden"><div class="box-container"><h2>Login Candidato</h2><label>E-mail/CPF</label><input type="text"><label>Senha</label><input type="password"><button class="btn-acao" onclick="executarEntrada('candidato')">ENTRAR</button></div></div>

        <div id="dashboard" class="hidden"><div class="box-container"><h2>Bem-vindo!</h2><p>Abra o menu lateral (☰) para navegar.</p></div></div>

        <div id="perfil-empresa" class="hidden">
            <div class="box-container">
                <h2>Perfil da Empresa</h2>
                <div style="text-align:center">
                    <img src="https://via.placeholder.com/150" class="profile-pic" id="foto-e-prev">
                    <label style="color:#0d47a1; cursor:pointer; font-size:12px">Alterar Logo<input type="file" style="display:none" onchange="previewImg(this, 'foto-e-prev')"></label>
                </div>
                <label>Descrição:</label><textarea id="e_perf_desc" rows="4"></textarea>
                
                <label>Requisitos/Valores da Empresa (+):</label>
                <div style="display:flex; gap:10px;"><input type="text" id="req_p_input" style="margin:0"><button class="btn-acao" style="width:50px" onclick="addDinamico('req_p_input', 'lista-p', reqsP)">+</button></div>
                <div id="lista-p" style="margin-top:10px"></div>

                <label>País:</label><input type="text" placeholder="Brasil"><label>Estado:</label><input type="text"><label>Cidade:</label><input type="text">
                <button class="btn-acao">ATUALIZAR PERFIL</button>
            </div>
        </div>

        <div id="perfil-candidato" class="hidden">
            <div class="box-container">
                <h2>Meu Perfil</h2>
                <div style="text-align:center">
                    <img src="https://via.placeholder.com/150" class="profile-pic" id="foto-c-prev">
                    <label style="color:#0d47a1; cursor:pointer; font-size:12px">Alterar Foto<input type="file" style="display:none" onchange="previewImg(this, 'foto-c-prev')"></label>
                </div>
                <label>País:</label><input type="text" placeholder="Brasil"><label>Estado:</label><input type="text"><label>Cidade:</label><input type="text">
                <label>Escolaridade:</label>
                <select>
                    <option>Ensino Fundamental Cursando</option><option>Ensino Fundamental Completo</option><option>Ensino Médio Cursando</option><option>Ensino Médio Completo</option><option>Ensino Técnico Cursando</option><option>Ensino Técnico Completo</option><option>Ensino Superior Cursando</option><option>Ensino Superior Completo</option><option>Pós-Graduação Cursando</option><option>Pós-Graduação Completo</option><option>Mestrado Cursando</option><option>Mestrado Completo</option><option>Doutorado Cursando</option><option>Doutorado Completo</option><option>MBA Cursando</option><option>MBA Completo</option>
                </select>
                <button class="btn-acao">SALVAR PERFIL</button>
            </div>
        </div>

        <div id="publicar-vagas" class="hidden">
            <div class="box-container">
                <h2>Publicar Nova Vaga</h2>
                <label>Nome da vaga:</label><input type="text" id="v_nome">
                <label>Salário:</label><input type="text" id="v_salario">
                <label>Localidade:</label><input type="text" id="v_local">
                <label>Requisitos (+):</label>
                <div style="display:flex; gap:10px;"><input type="text" id="req_v_input" style="margin:0"><button class="btn-acao" style="width:50px" onclick="addDinamico('req_v_input', 'lista-v', reqsV)">+</button></div>
                <div id="lista-v" style="margin-top:10px"></div>
                <button class="btn-acao" style="margin-top:20px" onclick="alert('Vaga Publicada!')">PUBLICAR VAGA</button>
            </div>
        </div>
    </div>

    <script>
        let reqsP = []; let reqsV = [];

        function mostrarTela(id) {
            document.querySelectorAll('.main-container > div').forEach(d => d.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function executarEntrada(tipo) {
    // Esconde os links de login/cadastro da parte superior
    document.getElementById('nav-links').classList.add('hidden');
    // Mostra o botão de menu (hambúrguer)
    document.getElementById('btn-hamburguer').style.display = 'block';
    
    const menu = document.getElementById('menu-contextual');

    if(tipo === 'empresa') {
        // Menu para Empresa (Sua 2ª imagem)
        menu.innerHTML = `
            <div class="menu-item" onclick="mostrarTela('perfil-empresa');toggleSidebar()">
                <i class="fas fa-user-circle"></i> Meu Perfil
            </div>
            <div class="menu-item" onclick="mostrarTela('publicar-vagas');toggleSidebar()">
                <i class="fas fa-plus-square"></i> Cadastrar novas vagas
            </div>
            <div class="menu-item" onclick="toggleSidebar()">
                <i class="fas fa-bullhorn"></i> Vagas publicadas
            </div>
            <div class="menu-item" onclick="toggleSidebar()">
                <i class="fas fa-headset"></i> Suporte
            </div>
        `;
        // Se houver descrição no cadastro, joga para o perfil
        const descCad = document.getElementById('e_desc_cad');
        const descPerf = document.getElementById('e_perf_desc');
        if(descCad && descPerf) descPerf.value = descCad.value;

    } else {
        // Menu para Candidato/Usuário (Sua 1ª imagem)
        menu.innerHTML = `
            <div class="menu-item" onclick="mostrarTela('perfil-candidato');toggleSidebar()">
                <i class="fas fa-user-circle"></i> Meu Perfil
            </div>
            <div class="menu-item" onclick="toggleSidebar()">
                <i class="fas fa-briefcase"></i> Minhas vagas
            </div>
            <div class="menu-item" onclick="toggleSidebar()">
                <i class="fas fa-headset"></i> Suporte
            </div>
        `;
    }
    
    // Leva o usuário para a tela inicial do painel
    mostrarTela('dashboard');
}

        function addDinamico(idIn, idLis, arr) {
            const val = document.getElementById(idIn).value;
            if(!val) return;
            arr.push(val); document.getElementById(idIn).value = "";
            renderList(idLis, arr);
        }

        function renderList(idLis, arr) {
            document.getElementById(idLis).innerHTML = arr.map((r, i) => `
                <div class="req-item"><span>• ${r}</span><i class="fas fa-trash" style="color:red;cursor:pointer" onclick="remover('${idLis}', ${i})"></i></div>
            `).join('');
        }

        function remover(idLis, i) {
            let arr = (idLis === 'lista-p') ? reqsP : reqsV;
            arr.splice(i, 1); renderList(idLis, arr);
        }

        function previewImg(input, id) { if(input.files && input.files[0]) { var r = new FileReader(); r.onload = function(e){document.getElementById(id).src=e.target.result;}; r.readAsDataURL(input.files[0]); } }
        
        function medirSenha(s, id) {
            const b = document.getElementById(id);
            b.style.width = s.length > 7 ? "100%" : s.length > 4 ? "50%" : "20%";
            b.style.background = s.length > 7 ? "green" : s.length > 4 ? "orange" : "red";
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
    </script>
</body>
</html>
