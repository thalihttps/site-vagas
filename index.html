<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecter</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; background-color: #e3f2fd; min-height: 100vh; overflow-x: hidden; }
        
        /* Navbar Superior */
        .navbar { background: #0d47a1; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; top: 0; z-index: 1000; box-sizing: border-box; }
        .nav-links { font-size: 13px; font-weight: bold; letter-spacing: 1px; }
        .nav-links span { cursor: pointer; text-transform: uppercase; margin-left: 15px; }

        /* Sidebar (Só aparece logado) */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; box-shadow: 2px 0 10px rgba(0,0,0,0.1); transition: 0.3s; z-index: 1001; padding-top: 60px; }
        .sidebar.active { left: 0; }
        .menu-item { display: flex; align-items: center; padding: 15px 25px; color: #333; cursor: pointer; text-decoration: none; font-size: 14px; border-bottom: 1px solid #f0f0f0; }
        .menu-item:hover { background: #f0f7ff; color: #0d47a1; }
        .menu-item i { margin-right: 15px; width: 20px; text-align: center; }
        
        .btn-menu { background: none; border: none; color: white; font-size: 20px; cursor: pointer; display: none; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 999; }
        .overlay.active { display: block; }

        .main-container { padding: 120px 20px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .hidden { display: none !important; }

        /* Estilo do Formulário (Exatamente como a imagem) */
        .box-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: left; }
        .box-container h2 { margin: 0 0 20px; color: #000; font-size: 1.5rem; }
        label { display: block; font-size: 14px; margin-bottom: 5px; color: #333; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .btn-acao { width: 100%; background: #0d47a1; color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 14px; margin-top: 10px; }
        
        /* Medidor de Senha */
        .meter { height: 5px; background: #eee; margin-top: -10px; margin-bottom: 15px; border-radius: 3px; overflow: hidden; }
        .meter-bar { height: 100%; width: 0; transition: 0.3s; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div style="display: flex; align-items: center;">
            <button class="btn-menu" id="btn-hamburguer" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            <strong style="margin-left: 10px; cursor: pointer;" onclick="voltarHome()">CONNECTER</strong>
        </div>
        <div class="nav-links" id="nav-links">
            <span onclick="mostrarTela('login-empresa')">Entre como Empresa</span> | 
            <span onclick="mostrarTela('login-candidato')">Entre como Candidato</span>
        </div>
    </nav>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div id="menu-contextual"></div>
        <div class="menu-item" onclick="location.reload()" style="color: red; border-top: 2px solid #f0f0f0;"><i class="fas fa-power-off"></i> Sair</div>
    </div>

    <div class="main-container">
        <div id="home">
            <h1 style="color: #0d47a1; font-size: 3rem; margin-bottom: 40px;">CONNECTER</h1>
            <button style="background:white; color:#0d47a1; padding:40px 50px; border-radius:60px; box-shadow: 0 8px 15px rgba(0,0,0,0.1); border:2px solid transparent; cursor:pointer; font-weight:bold; margin:10px; text-transform:uppercase;" onclick="mostrarTela('cad-empresa')">Cadastre-se como Empresa</button>
            <button style="background:white; color:#0d47a1; padding:40px 50px; border-radius:60px; box-shadow: 0 8px 15px rgba(0,0,0,0.1); border:2px solid transparent; cursor:pointer; font-weight:bold; margin:10px; text-transform:uppercase;" onclick="mostrarTela('cad-candidato')">Cadastre-se como Candidato</button>
        </div>

        <div id="cad-empresa" class="hidden">
            <div class="box-container">
                <h2>Cadastro Empresa</h2>
                <label>E-mail Corporativo:</label><input type="email" id="e_email">
                <label>Senha:</label><input type="password" id="e_pass" oninput="medirSenha(this.value, 'm1')">
                <div class="meter"><div id="m1" class="meter-bar"></div></div>
                
                <label>Nome da Empresa:</label><input type="text" id="e_nome">
                <label>CNPJ (14 nº):</label><input type="text" maxlength="14" id="e_cnpj">
                
                <label>Setor de Atuação:</label>
                <select id="e_setor" onchange="document.getElementById('e_outro_div').className = this.value === 'Outros' ? '' : 'hidden'">
                    <option value="Tecnologia">Tecnologia</option>
                    <option value="Saúde">Saúde</option>
                    <option value="Educação">Educação</option>
                    <option value="Outros">Outros...</option>
                </select>
                <div id="e_outro_div" class="hidden"><label>Especifique:</label><input type="text" id="e_setor_outro"></div>
                
                <label>Descrição da Empresa:</label><textarea id="e_desc" rows="3"></textarea>
                
                <button class="btn-acao" onclick="salvar('empresa')">CADASTRAR E ENTRAR</button>
            </div>
        </div>

        <div id="dashboard" class="hidden">
            <h1 style="color: #0d47a1;">Painel de Controle</h1>
            <p>Seja bem-vindo. Use o menu lateral para navegar.</p>
        </div>
    </div>

    <script>
        const SB_URL = 'https://somngtdevyazwqonmayo.supabase.co'; 
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvbW5ndGRldnlhendxb25tYXlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MTk2NTQsImV4cCI6MjA4OTA5NTY1NH0.RGf3ZMVw6n4GyIVroBBUoD7dmKQAOReUuAsew0DVBVw'; 
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function medirSenha(s, id) {
            const b = document.getElementById(id);
            if(s.length > 7) { b.style.width="100%"; b.style.background="green"; }
            else if(s.length > 4) { b.style.width="50%"; b.style.background="orange"; }
            else { b.style.width="20%"; b.style.background="red"; }
        }

        function mostrarTela(id) {
            ['home', 'cad-empresa', 'dashboard'].forEach(t => {
                if(document.getElementById(t)) document.getElementById(t).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
        }

        async function salvar(tipo) {
            const email = document.getElementById('e_email').value;
            const nome = document.getElementById('e_nome').value;
            const cnpj = document.getElementById('e_cnpj').value;
            const setor = document.getElementById('e_setor').value;
            const desc = document.getElementById('e_desc').value;

            const { error } = await _supabase.from('empresas').insert([{ 
                email, 
                nome_empresa: nome, 
                cnpj, 
                area_atuacao: setor === 'Outros' ? document.getElementById('e_setor_outro').value : setor,
                descricao: desc
            }]);

            if (error) {
                if (error.code === '23505') alert("E-mail ou CNPJ já cadastrado!");
                else alert("Erro: " + error.message);
            } else {
                entrarDireto('empresa', nome);
            }
        }

        function entrarDireto(tipo, nome) {
            document.getElementById('nav-links').classList.add('hidden');
            document.getElementById('btn-hamburguer').style.display = 'block';
            
            const menu = document.getElementById('menu-contextual');
            menu.innerHTML = `
                <div class="menu-item"><i class="fas fa-user-circle"></i> Meu Perfil</div>
                <div class="menu-item"><i class="fas fa-list-ul"></i> Minhas vagas publicadas</div>
                <div class="menu-item"><i class="fas fa-briefcase"></i> Publicar novas vagas</div>
