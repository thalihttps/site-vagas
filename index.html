<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecter</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: #e3f2fd; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }

        /* Menu Superior */
        .navbar { 
            position: absolute; 
            top: 0; 
            width: 100%; 
            display: flex; 
            justify-content: flex-end; 
            padding: 20px 40px; 
            box-sizing: border-box; 
        }

        .nav-links { 
            font-size: 13px; 
            font-weight: bold; 
            color: #0d47a1; 
            letter-spacing: 1px; 
        }

        .nav-links span { 
            cursor: pointer; 
            text-transform: uppercase; 
        }

        /* Container Principal */
        .main-container { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
        }

        .site-title { 
            color: #0d47a1; 
            font-size: 3rem; 
            margin-bottom: 40px; 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }

        .button-group { 
            display: flex; 
            gap: 20px; 
        }

        /* Botões Centrais (Cards) */
        .card-balao { 
            background-color: #ffffff; 
            color: #0d47a1; 
            padding: 40px 50px; 
            border-radius: 60px; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.1); 
            transition: all 0.2s ease; 
            border: 2px solid transparent; 
            cursor: pointer; 
            text-transform: uppercase; 
            font-weight: bold; 
            font-size: 1.1rem; 
        }

        .card-balao:hover { 
            border-color: #0d47a1; 
            transform: translateY(-5px); 
        }

        .card-balao:active { 
            transform: translateY(2px); 
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-links">
            <span id="login-empresa">Entre como Empresa</span> | 
            <span id="login-candidato">Entre como Candidato</span>
        </div>
    </nav>

    <div class="main-container">
        <h1 class="site-title">Connecter</h1>
        
        <div class="button-group">
            <button class="card-balao" id="cad-empresa">Cadastre-se como Empresa</button>
            <button class="card-balao" id="cad-candidato">Cadastre-se como Candidato</button>
        </div>
    </div>

</body>
</html>
