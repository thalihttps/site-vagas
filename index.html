<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Conecta - Vagas</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: #f0f4f8; overflow-x: hidden; }

        /* Barra Superior */
        .top-bar { 
            background: #0d47a1; color: white; padding: 10px 20px; 
            display: flex; align-items: center; position: fixed; top: 0; width: 100%; z-index: 1000; 
        }
        .btn-menu { background: none; border: none; color: white; font-size: 22px; cursor: pointer; margin-right: 20px; }
        .logo { font-weight: bold; font-size: 18px; letter-spacing: 1px; }

        /* Sidebar (Menu Lateral) */
        .sidebar { 
            position: fixed; left: -260px; top: 0; width: 260px; height: 100%; 
            background: #ffffff; box-shadow: 2px 0 10px rgba(0,0,0,0.1); 
            transition: 0.3s; z-index: 1001; padding-top: 60px; 
        }
        .sidebar.active { left: 0; }
        
        /* Itens do Menu */
        .menu-perfil { text-align: center; padding: 20px; border-bottom: 1px solid #eee; }
        .foto-perfil { width: 80px; height: 80px; background: #ddd; border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 40px; color: #aaa; overflow: hidden; }
        .menu-item { 
            display: flex; align-items: center; padding: 15px 25px; 
            color: #444; text-decoration: none; transition: 0.2s; cursor: pointer;
        }
        .menu-item:hover { background: #e3f2fd; color: #0d47a1; }
        .menu-item i { margin-right: 15px; width: 20px; text-align: center; }

        /* Overlay (Fundo escuro quando abre o menu) */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); display: none; z-index: 999; }
        .overlay.active { display: block; }

        /* Conteúdo Principal */
        .main-content { padding: 80px 40px 40px; transition: 0.3s; }
        
        /* Cards e Layout */
        .hero-section { text-align: center; margin-top: 100px; }
        .card-balao { background: white; color: #0d47a1; padding: 30px 50px; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: 15px; }
        .vagas-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .vaga-card { background: white; padding: 20px; border-radius: 8px; border-left: 5px solid #0d47a1; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="btn-menu" id="btn-toggle" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
        <div class="logo">CONECTA</div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="sidebar" id="sidebar">
        <div class="menu-perfil">
            <div class="foto-perfil" id="foto-area">
                <i class="fas fa-user"></i>
            </div>
            <strong id="user-display">Visitante</strong>
        </div>

        <div id="menu-empresa" class="hidden">
            <div class="menu-item" onclick="alert('Perfil')"><i class="fas fa-circle-user"></i> Meu Perfil</div>
            <div class="menu-item" onclick="alert('Publicar')"><i class="fas fa-briefcase"></i> Publicar novas vagas</div>
            <div class="menu-item" onclick="alert('Minhas Vagas')"><i class="fas fa-list-check"></i> Minhas vagas publicadas</div>
        </div>

        <div id="menu-candidato" class="hidden">
            <div class="menu-item" onclick="alert('Perfil')"><i class="fas fa-circle-user"></i> Meu Perfil</div>
            <div class="menu-item" onclick="alert('Vagas')"><i class="fas fa-file-invoice"></i> Minhas Vagas</div>
        </div>

        <div class="menu-item" onclick="logout()" style="color: #f44336;"><i class="fas fa-right-from-bracket"></i> Sair</div>
    </div>

    <div class="main-content">
        <div id="tela-inicial" class="hero-section">
            <h1 style="color: #0d47a1">Bem-vindo ao Conecta</h1>
            <p>Escolha uma opção para começar seu cadastro ou acesse pelo menu superior.</p>
            <button class="card-balao" onclick="simularLogin('empresa')">Teste: Entrar como Empresa</button>
            <button class="card-balao" onclick="simularLogin('candidato')">Teste: Entrar como Candidato</button>
        </div>

        <div id="tela-dashboard" class="hidden">
            <h2>Vagas Disponíveis</h2>
            <div class="vagas-grid">
                <div class="vaga-card">
                    <h3>Vaga de Teste</h3>
                    <p>Empresa XPTO</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Lógica do Menu Retrátil
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function mudarTela(id) {
            document.getElementById('tela-inicial').classList.add('hidden');
            document.getElementById('tela-dashboard').classList.add('hidden');
            document.getElementById('tela-' + id).classList.remove('hidden');
        }

        function simularLogin(tipo) {
            // Esconde menus anteriores
            document.getElementById('menu-empresa').classList.add('hidden');
            document.getElementById('menu-candidato').classList.add('hidden');

            // Ativa o menu correto
            if(tipo === 'empresa') {
                document.getElementById('menu-empresa').classList.remove('hidden');
                document.getElementById('user-display').innerText = "Empresa Ltda";
            } else {
                document.getElementById('menu-candidato').classList.remove('hidden');
                document.getElementById('user-display').innerText = "Candidato Silva";
            }

            mudarTela('dashboard');
            toggleMenu(); // Abre o menu automaticamente para mostrar as opções
        }

        function logout() {
            location.reload();
        }
    </script>
</body>
</html>
